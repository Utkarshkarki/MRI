# Base Configuration mapping for Phase 1
gpu:
  mixed_precision: true

model:
  num_classes: 4
  num_ensemble_heads: 3
  dropout_rate: 0.5
  
training:
  batch_size: 16 # Reduced 32→16 to prevent CUDA OOM on backward pass
  num_epochs: 50
  learning_rate: 1e-3

uncertainty:
  mc_passes: 15 # Reduced heavily to preserve real-time Streamlit UI speeds natively
  anomaly_threshold: 0.25
